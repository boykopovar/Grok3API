  bool is_enabled = 4;
  bytes next_run = 5;
  int32 day_of_week = 6;
  int32 day_of_month = 7;
  string day_of_year = 8;
  string time_of_day = 9;
  string timezone = 10;
  bool is_completed = 11;
  bytes end_date = 12;
}

message TaskTool {
  string id = 1;
  string label = 2;
  string icon = 3;
  repeated string tool_ids = 4;
  repeated string connector_ids = 5;
}

message TaskToolsResults {
  repeated TaskTool tools = 1;
}

message TaskUsage {
  float usage = 1;
  float limit = 2;
  int32 frequent_usage = 3;
  int32 frequent_limit = 4;
  int32 occasional_usage = 5;
  int32 occasional_limit = 6;
}

message TaskUsageRequest {
}

message TaskWithSchedule {
  Task task = 1;
  repeated TaskSchedule schedules = 3;
}

message TopUpOrGetExistingPendingChangeRequest {

    PortalSessionFlowData.FlowDataAfterCompletion.RedirectToUrl redirect = 3;
  }

  message FlowDataSubscriptionCancel {
    message Retention {
      message CouponOffer {
        string coupon = 1;
      }

      PortalSessionFlowData.FlowDataSubscriptionCancel.Retention.CouponOffer coupon_offer = 1;
    }

    string subscription = 1;
    PortalSessionFlowData.FlowDataSubscriptionCancel.Retention retention = 2;
  }

  message FlowDataSubscriptionUpdate {
    string subscription = 1;
  }

  BillingPortalFlowType type = 1;
  PortalSessionFlowData.FlowDataAfterCompletion after_completion = 2;
  PortalSessionFlowData.FlowDataSubscriptionCancel subscription_cancel = 3;
  PortalSessionFlowData.FlowDataSubscriptionUpdate subscription_update = 4;
}


  bool make_new_version = 2;
  string name = 3;
  bytes content = 4;
}

message UpdateSystemPromptRequest {
  string system_prompt_id = 1;
  string name = 2;
  repeated Content content = 3;
}

message UpdateTaskRequest {
  string task_id = 1;
  string schedule_id = 2;
  CreateTaskRequest updated_task = 3;

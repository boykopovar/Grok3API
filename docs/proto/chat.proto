  int32 favorite_count = 7;
  int32 view_count = 8;
  string community_note = 9;
  string parent_post = 10;
  string quote_post = 11;
  repeated XPostMedia media = 12;
  int32 thread_id = 13;
  bool is_target_post = 14;
  repeated XPostUrls urls = 15;
  string verified_type = 16;
  XPostPublicMetrics public_metrics = 17;
  XPostEntitiesEntity entities = 18;
}

message XPostEntitiesEntity {
  repeated XPostMediaEntity media = 1;
  repeated XPostUrlEntity urls = 2;
  repeated XPostHashtagEntity hashtags = 3;
  repeated XPostMentionEntity mentions = 4;
}

message XPostHashtagEntity {
  string tag = 1;
  int32 start = 2;
  int32 end = 3;
}

message XPostMedia {
  XPostMediaImage image = 1;
  XPostMediaVideo video = 2;
}

message XPostMediaEntity {
  string media_key = 1;
  string type = 2;
  string url = 3;
  int32 width = 4;
  int32 height = 5;
  string preview_image_url = 6;
}

message XPostMediaImage {
  string type = 1;
  string base64 = 2;
}

message XPostMediaVideo {
  string type = 1;
  repeated string base64_frames = 2;
  repeated string subtitle_buckets = 3;
  int32 max_frames = 4;
  float duration = 5;
  float bucket_duration = 6;
  string fallback_image_base64 = 7;
}

message XPostMentionEntity {
  string username = 1;
  int32 start = 2;
  int32 end = 3;
}

message XPostPublicMetrics {
  int32 view_count = 1;
  int32 like_count = 2;
  int32 reply_count = 3;
  int32 retweet_count = 4;
  int32 quote_count = 5;
}

message XPostResult {
  repeated XPost posts = 1;
}

message XPostUrlEntity {
  string url = 1;
  string expanded_url = 2;
  string display_url = 3;
  int32 start = 4;
  int32 end = 5;
}

message XPostUrls {
  string shortened_url = 1;
  string unwound_url = 2;
}

message XSearchTool {
  message Args {
    string query = 1;
  }

  XSearchTool.Args args = 1;
}

message XThread {
  XPost root = 1;
  PostInnerResult target_post_inner_result = 2;
  repeated XThread children = 3;
}

message XThreadFetchTool {
  message Args {
    string post_id = 1;
  }

  XThreadFetchTool.Args args = 1;
}

message XThreadResult {
  XThread thread = 1;
}

message XUserSearchTool {
  message Args {
    string query = 1;
  }

  XUserSearchTool.Args args = 1;
}
